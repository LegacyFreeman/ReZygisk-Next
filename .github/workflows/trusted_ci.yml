name: Trusted CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Тип сборки'
        required: true
        default: 'both'
        type: choice
        options:
          - release
          - debug
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "true"
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup keys
        env:
          private_key: ${{ secrets.ORG_PRIVATE_KEY }}
          public_key: ${{ secrets.ORG_PUBLIC_KEY }}
        run: |
          if [ -z "$private_key" ] || [ -z "$public_key" ]; then
            echo "Private or public key is not set."
          else
            echo "$private_key" | base64 -d > module/private_key
            echo "$public_key" | base64 -d > module/public_key
          fi

      - name: Build with Gradle
        run: |
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          sed -i 's/org.gradle.unsafe.configuration-cache=true//g' gradle.properties

          bash <<'EOF'
          if [ "${{ github.event.inputs.variant }}" == "release" ]; then
            ./gradlew zipRelease
          elif [ "${{ github.event.inputs.variant }}" == "debug" ]; then
            ./gradlew zipDebug
          else
            ./gradlew zipRelease zipDebug
          fi
          EOF

      - name: Prepare artifact
        if: success()
        id: prepareArtifact
        run: |
          releasePath=$(ls module/build/outputs/release/ReZygisk-v*-release.zip 2>/dev/null || echo "")
          debugPath=$(ls module/build/outputs/release/ReZygisk-v*-debug.zip 2>/dev/null || echo "")

          if [ -n "$releasePath" ]; then
            releaseName=$(basename "$releasePath" .zip)
            echo "releaseName=$releaseName" >> $GITHUB_OUTPUT
            unzip "$releasePath" -d zksu-release
          fi

          if [ -n "$debugPath" ]; then
            debugName=$(basename "$debugPath" .zip)
            echo "debugName=$debugName" >> $GITHUB_OUTPUT
            unzip "$debugPath" -d zksu-debug
          fi

      - name: Upload release
        if: ${{ github.event.inputs.variant != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.releaseName }}
          path: ./zksu-release/*

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.variant != 'debug' && steps.prepareArtifact.outputs.releaseName }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepareArtifact.outputs.releaseName }}
          name: ${{ steps.prepareArtifact.outputs.releaseName }}
          files: module/build/outputs/release/ReZygisk-v*-release.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug
        if: ${{ github.event.inputs.variant != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.debugName }}
          path: ./zksu-debug/*

      - name: Notify in Telegram with download buttons
        if: always()
        run: |
          status="${{ job.status }}"
          actor="${{ github.actor }}"
          build_variant="${{ github.event.inputs.variant }}"
          build_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          releaseName="${{ steps.prepareArtifact.outputs.releaseName }}"
          debugName="${{ steps.prepareArtifact.outputs.debugName }}"

          # Подготовка кнопок
          buttons="[]"
          button_items=""

          if [ -n "$releaseName" ]; then
            button_items='[{"text":"⬇️ Release ZIP","url":"'"$build_url"'"}]'
          fi

          if [ -n "$debugName" ]; then
            if [ -n "$button_items" ]; then
              button_items="$button_items,[{\"text\":\"🐞 Debug ZIP\",\"url\":\"$build_url\"}]"
            else
              button_items='[{"text":"🐞 Debug ZIP","url":"'"$build_url"'"}]'
            fi
          fi

          if [ -n "$button_items" ]; then
            buttons="[${button_items}]"
          fi

          # Собираем JSON через jq
          json_payload=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "⚙️ *ReZygisk Build Completed*\n📦 *Variant*: $build_variant\n👤 *By*: $actor\n🔗 [View Logs]($build_url)" \
            --argjson keyboard "$buttons" \
            '{
              chat_id: $chat_id,
              text: $text,
              parse_mode: "Markdown",
              reply_markup: {
                inline_keyboard: $keyboard
              }
            }'
          )

          echo "📬 Отправляю сообщение в Telegram..."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$json_payload"
